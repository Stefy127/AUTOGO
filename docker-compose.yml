services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: autogo_postgres
    environment:
      POSTGRES_USER: autogo
      POSTGRES_PASSWORD: autogo123
      POSTGRES_DB: autogo_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autogo -d autogo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autogo_network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autogo_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://autogo:autogo123@postgres:5432/autogo_db}
      SECRET_KEY: ${SECRET_KEY:-}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AI_ENABLED: ${AI_ENABLED:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
      MAX_WORKSHOP_DISTANCE_KM: ${MAX_WORKSHOP_DISTANCE_KM:-50}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:4200/#/payment-success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:4200/#/payment-cancel}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autogo_network
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Frontend Web (Angular)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autogo_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - autogo_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  autogo_network:
    driver: bridge
