name: autogo_mobile
description: AutoGo - Emergencias Vehiculares
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  image_picker: ^1.0.5
  intl: ^0.18.1
  mapbox_maps_flutter: ^2.0.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  record: ^6.0.0
  just_audio: ^0.9.38
  path_provider: ^2.1.2
  http_parser: ^4.0.2
  flutter_local_notifications: ^17.2.3
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
