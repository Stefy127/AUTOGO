<div class="map-container">
  <div class="map-instructions">
    📍 Haz clic en el mapa para seleccionar la ubicación de tu taller
  </div>
  
  <google-map
    [center]="center"
    [zoom]="zoom"
    [options]="mapOptions"
    (mapClick)="onMapClick($event)"
    width="100%"
    height="400px">
    
    <map-marker
      *ngIf="markerPosition"
      [position]="markerPosition"
      [options]="markerOptions">
    </map-marker>
  </google-map>
</div>
